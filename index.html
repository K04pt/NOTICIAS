<!DOCTYPE html>
<html>
<head>
<title>Noticias Katva</title>
<link rel="stylesheet" href="styles.css">

<script>
function cargarPagina(pagina){
    var xhttp = new XMLHttpRequest();

    xhttp.onreadystatechange = function(){
        if(this.readyState == 4 && this.status == 200){
            document.getElementById("contenido").innerHTML = this.responseText;
        }
    };

    xhttp.open("GET", pagina, true);
    xhttp.send();
}
</script>

</head>

<body>
<header>
<h1>Noticias Katva</h1>

<nav>

<a href="#" onclick="cargarPagina('inicio.html')">INICIO</a> |
<a href="#" onclick="cargarPagina('nacionales.html')">NACIONALES</a> |
<a href="#" onclick="cargarPagina('deportes.html')">DEPORTES</a> |
<a href="#" onclick="cargarPagina('espectaculos.html')">ESPECTACULOS</a> |
<a href="#" onclick="cargarPagina('recetas.html')">RECETAS</a> |
<a href="#" onclick="cargarPagina('contacto.html')">CONTACTO</a>

</nav>
</header>
<hr>

<div id="contenido">
<h2>Bienvenido</h2>
<p>Selecciona una sección del menú.</p>
</div>

<hr>

<footer>
<p>Noticias Katva</p>
<p>Todos los derechos reservados</p>
</footer>

</body>
</html>
